name: Boundra

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-example:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm check-release-notes
      - run: pnpm verify-example
      - run: pnpm verify-clean-room
      - run: cargo clippy --workspace --all-targets -- -D warnings

  verify-runtime:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm exec tsc -- -p packages/runtime/tsconfig.build.json
      - run: npm run test-runtime

  verify-cli-platforms:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - macos-15-intel
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: cargo test --workspace
      - run: cargo build --release -p boundra-cli
      - run: ./target/release/boundra --version
      - run: node packages/runtime/bin/boundra.mjs --version
        env:
          BOUNDRA_CLI_PATH: ${{ runner.os == 'Windows' && format('{0}\\target\\release\\boundra.exe', github.workspace) || format('{0}/target/release/boundra', github.workspace) }}
