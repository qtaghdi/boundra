name: Boundra

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-dogfood:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify-dogfood
      - run: pnpm verify-clean-room
      - run: cargo clippy --workspace --all-targets -- -D warnings

  verify-runtime:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @boundra/runtime build
      - run: pnpm test-runtime

  verify-cli-platforms:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - macos-15-intel
          - windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo build --release -p boundra-cli
      - run: ./target/release/boundra --version
